<!DOCTYPE html>
<html lang="en">

<body> 
    <h1>Switch Statements</h1>

    <button class="btn btn-info" onclick="teamrank()">Team Rank</button>
    <script>

        function teamrank(){
            var rank = "1st";
            message = "";
                switch(true)
            {
                case (rank === "1st") :
                    message = "First";
                    break;
                case (rank === "2nd") :
                    message = "Second";
                    break;
                case (rank === "3rd") :
                    message = "Third";
                    break;
                case (rank === "4th") :
                    message = "Fourth";
                    break;
                default:
                    message = "Invalid rank";
        }
          alert(message);
    }
        let team = "Red Bulldogs";{

        switch (team){
            case "Red" :
                alert("Go Red Bulldogs!");
                break;
            case "Blue"  :
                alert("Go Blue Bears!");
                break;
            case "Green" :
                alert("Go Green Hornets!");
                break;
            case "Yellow" :
                alert("Go Yellow Tigers!");
            default :
            alert("What team is this bro?");           
        }
    }    
    </script>
</body>
</html>
